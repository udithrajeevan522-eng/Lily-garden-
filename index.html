
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bubsie ❤️</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Georgia,serif;background:linear-gradient(#9ed8ff,#eaf8ff);}
#garden{position:relative;width:100%;height:100%;}
.lily{position:absolute;font-size:42px;animation:sway 3s ease-in-out infinite;transform-origin:bottom center}
@keyframes sway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
.butterfly{position:absolute;font-size:28px;animation:fly 14s linear infinite}
@keyframes fly{
0%{transform:translate(-10vw,80vh)}
25%{transform:translate(30vw,30vh)}
50%{transform:translate(60vw,55vh)}
75%{transform:translate(85vw,20vh)}
100%{transform:translate(110vw,70vh)}
}
.petal{position:absolute;color:white;opacity:.9;animation:fall linear infinite}
@keyframes fall{
0%{transform:translateY(-10vh) rotate(0)}
100%{transform:translateY(110vh) translateX(40px) rotate(360deg)}
}
#msg{
position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
font-size:clamp(28px,6vw,64px);color:white;text-shadow:0 0 10px #d66;
opacity:0;animation:show 4s ease forwards;animation-delay:10s}
@keyframes show{to{opacity:1}}
</style>
</head>
<body>
<div id="garden"></div>
<div id="msg">lub zu bubsie ❤️</div>
<script>
const g=document.getElementById("garden");
for(let i=0;i<28;i++){
 let d=document.createElement("div");
 d.className="lily";
 d.textContent="🤍🌸";
 d.style.left=(Math.random()*95)+"vw";
 d.style.bottom=(Math.random()*20)+"px";
 d.style.animationDelay=(Math.random()*3)+"s";
 g.appendChild(d);
}
for(let i=0;i<4;i++){
 let b=document.createElement("div");
 b.className="butterfly";
 b.textContent="🦋";
 b.style.animationDelay=(i*2)+"s";
 g.appendChild(b);
}
for(let i=0;i<40;i++){
 let p=document.createElement("div");
 p.className="petal";
 p.textContent="❀";
 p.style.left=(Math.random()*100)+"vw";
 p.style.animationDuration=(6+Math.random()*6)+"s";
 p.style.animationDelay=(-Math.random()*10)+"s";
 g.appendChild(p);
}
</script>
</body>
</html>
